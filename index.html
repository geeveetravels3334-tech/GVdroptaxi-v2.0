
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geevee Travels - Tamilnadu Taxi Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Hind+Madurai:wght@300;400;500;600;700&family=Hind:wght@300;400;500;600;700&family=Noto+Sans+Telugu:wght@300;400;500;600;700;900&family=Noto+Sans+Kannada:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
      window.process = window.process || { env: {} };
      
      window.tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              geevee: {
                orange: '#F37021',
                dark: '#0a0a0a',
                slate: '#1e293b'
              }
            },
            fontFamily: {
              sans: ['Inter', 'Hind Madurai', 'Hind', 'Noto Sans Telugu', 'Noto Sans Kannada', 'sans-serif'],
              tamil: ['Hind Madurai', 'sans-serif'],
              hindi: ['Hind', 'sans-serif'],
              telugu: ['Noto Sans Telugu', 'sans-serif'],
              kannada: ['Noto Sans Kannada', 'sans-serif']
            },
            animation: {
              'subtle-zoom': 'zoomIn 20s ease-out forwards',
              'float': 'float 6s ease-in-out infinite',
              'slide-up': 'slideUp 0.6s ease-out forwards',
              'pulse-soft': 'pulseSoft 3s ease-in-out infinite',
              'blob': 'blob 10s infinite',
            },
            keyframes: {
              pulseSoft: {
                '0%, 100%': { opacity: 1, transform: 'scale(1)' },
                '50%': { opacity: 0.8, transform: 'scale(1.02)' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Hind Madurai', 'Hind', 'Noto Sans Telugu', 'Noto Sans Kannada', sans-serif;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
          width: 8px;
        }
        ::-webkit-scrollbar-track {
          background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
          background: #F37021;
          border-radius: 10px;
          border: 2px solid #0a0a0a;
        }

        /* Glassmorphism Utilities */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .dark .glass-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animation delays */
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* Print Styles */
        @media print {
          nav, footer, button, .no-print, .ai-trigger, #floating-ai {
            display: none !important;
          }
          body {
            margin: 0;
            padding: 0;
            background: white;
            color: black;
            -webkit-print-color-adjust: exact;
          }
        }
    </style>

        </div>
    </div>
