<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVDROPTAXI - Tamil Nadu's Ultra Premium Taxi Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=Hind+Madurai:wght@300;400;500;600;700&family=Hind:wght@300;400;500;600;700&family=Noto+Sans+Telugu:wght@300;400;500;600;700;900&family=Noto+Sans+Kannada:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
          if (!theme && supportDarkMode) theme = 'dark';
          if (!theme) theme = 'dark'; // Default to dark for this luxury brand if no preference
          
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) { console.error('Theme check failed', e); }
      })();
      window.process = window.process || { env: {} };

      // Global suppression of Google Maps BillingNotEnabledMapError alerts and dialogs
      window.gm_authFailure = function() {
        console.warn('Google Maps Auth/Billing Failure Intercepted. Silently downgraded to offline GIS mode.');
        window.__gm_auth_failed = true;
      };

      // Suppress alert popups containing Google Maps billing words
      var _originalAlert = window.alert;
      window.alert = function(msg) {
        var str = String(msg || '');
        if (
          str.indexOf('BillingNotEnabledMapError') !== -1 ||
          str.indexOf('billing/enable') !== -1 ||
          str.indexOf('Google Maps') !== -1 ||
          str.indexOf('Billing') !== -1
        ) {
          console.warn('Silent fallback: alert suppressed:', str);
          window.__gm_auth_failed = true;
          return;
        }
        if (_originalAlert) {
          try {
            _originalAlert.apply(window, arguments);
          } catch (e) {
            _originalAlert(msg);
          }
        }
      };

      // Suppress error logs in developer console containing Google Maps billing triggers
      var _originalConsoleError = console.error;
      console.error = function() {
        var argsStr = Array.prototype.slice.call(arguments).map(String).join(' ');
        if (
          argsStr.indexOf('BillingNotEnabledMapError') !== -1 ||
          argsStr.indexOf('billing/enable') !== -1 ||
          argsStr.indexOf('Google Maps') !== -1 ||
          argsStr.indexOf('Billing') !== -1
        ) {
          console.warn('Silent fallback: console error suppressed:', argsStr);
          window.__gm_auth_failed = true;
          return;
        }
        if (_originalConsoleError) {
          _originalConsoleError.apply(console, arguments);
        }
      };
    </script>
</head>
<body class="relative min-h-screen antialiased">
    <div id="root">
        <!-- Loader during initialization -->
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #040812; color: white; font-family: sans-serif;">
            <div style="text-align: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-loader-2" style="animation: spin 1s linear infinite; margin: 0 auto 16px auto;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                <h1 style="font-weight: 900; letter-spacing: 0.15em; font-size: 1.25rem; color: #D4AF37;">GVDROPTAXI</h1>
                <p style="color: rgba(255,255,255,0.4); font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 8px;">Preparing luxury travel protocol...</p>
            </div>
            <style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
        </div>
    </div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
